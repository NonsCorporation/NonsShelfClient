<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Nons Shelf — the nons-client mark used directly: its two pillars are kept
       as-is, the top dot is dropped, and a square sits above the brand circle
       at the bottom centre, between the pillars. -->
