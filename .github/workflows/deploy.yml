name: Deploy React to GitHub Pages

on:
  push:
    branches: ["main"] # Triggers the workflow when you push to main
  manual_dispatch: # Allows you to trigger the workflow manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          # Nons Shelf is served on GitHub Pages (shelf.nonsapp.com); its API and
          # the identity provider are separate origins, so they must be baked in
          # at build time. Override via repo Variables if the hosts change.
          VITE_LIBRARY_API_URL: ${{ vars.VITE_LIBRARY_API_URL || 'https://shelfapi.nonsapp.com' }}
          VITE_NONS_API_URL: ${{ vars.VITE_NONS_API_URL || 'https://nonsapp.com' }}
          VITE_NONS_LOGIN_URL: ${{ vars.VITE_NONS_LOGIN_URL || 'https://nonsapp.com' }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4